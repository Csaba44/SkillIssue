############################
# HTTP -> HTTPS REDIRECT
############################
server {
    listen 80;
    server_name skillissue.hu api.skillissue.hu;
    return 301 https://$host$request_uri;
}

############################
# FRONTEND - HTTPS
############################
server {
    listen 443 ssl;
    server_name skillissue.hu;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/nginx/certs/skillissue.pem;
    ssl_certificate_key /etc/nginx/certs/skillissue.key;

    # SSL hardening (józan szint)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend (Vue SPA)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

############################
# API - HTTPS + FASTCGI
############################
server {
    listen 443 ssl;
    server_name api.skillissue.hu;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/nginx/certs/skillissue.pem;
    ssl_certificate_key /etc/nginx/certs/skillissue.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Laravel public directory
    root /var/www/public;
    index index.php;

    location / {
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        fastcgi_pass backend:9000;
    }
}
