services:
  mysql:
    image: mysql:8.0.36
    env_file:
      - .env.prod
    volumes:
      - mysql_data_skillissue:/var/lib/mysql
      - ./docker/prod/mysql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: skillissue-backend:latest
    entrypoint: ["/bin/sh", "/var/www/docker/prod/entrypoint.sh"]
    env_file:
      - .env.prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: skillissue-frontend:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mysql_data_skillissue:
