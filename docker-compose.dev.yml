services:
  mysql:
    container_name: skillissue_mysql
    image: mysql:8.0.36
    env_file:
      - .env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - 3306:3306
    volumes:
      - mysql_data_skillissue:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" || exit 1']
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s
  frontend:
    container_name: skillissue_frontend
    build:
      context: ./frontend
      target: dev
    env_file:
      - .env.dev
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data_skillissue:
