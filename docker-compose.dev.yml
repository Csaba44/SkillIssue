services:
  mysql:
    container_name: skillissue_mysql
    image: mysql:8.0.36
    env_file:
      - .env.dev
    ports:
      - 3306:3306
    volumes:
      - mysql_data_skillissue:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" || exit 1']
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s
  backend:
    user: "${UID}:${GID}"
    container_name: skillissue_backend
    build:
      context: ./api
      target: dev
    entrypoint: ["/bin/sh", "/docker/entrypoint.sh"]
    command: php-fpm
    volumes:
      - ./api:/var/www
      - ./api/docker/dev/entrypoint.sh:/docker/entrypoint.sh
    env_file:
      - .env.dev
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy
  artisan:
    user: "${UID}:${GID}"
    container_name: skillissue_artisan
    build: ./api
    entrypoint: ["php", "/var/www/artisan"]
    volumes:
      - ./api:/var/www
    env_file:
      - .env.dev
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy

  nginx:
    container_name: skillissue_nginx
    image: nginx:1.25-alpine
    ports:
      - 8080:80
    volumes:
      - ./api:/var/www
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
  frontend:
    container_name: skillissue_frontend
    build:
      context: ./frontend
      target: dev
    env_file:
      - .env.dev
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data_skillissue:
